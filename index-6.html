<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0b1a0e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="BugLens"/>
<title>BugLens – Insect Identifier</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b1a0e;--surface:#112016;--surface2:#192e1e;--border:#243d29;
  --green:#3dff6e;--green2:#a8ffbf;--muted:#5a8c65;
  --text:#d4edda;--danger:#ff5c5c;--warn:#ffcc44;
  --r:20px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow:hidden;user-select:none;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .5s ease .2s;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-emoji{font-size:72px;animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.splash-title{font-family:'Playfair Display',serif;font-size:42px;color:var(--green);letter-spacing:-1px;}
.splash-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}

/* ── APP SHELL ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-logo{display:flex;align-items:center;gap:8px;font-family:'Playfair Display',serif;font-size:22px;color:var(--green);}
.hdr-logo span{font-size:24px;}
.hdr-btn{background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:8px 10px;cursor:pointer;font-size:18px;display:flex;align-items:center;}
.hdr-btn:active{background:var(--border);}

/* ── HOME ── */
#homeView{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.capture-area{
  flex:1;margin:14px;border-radius:24px;overflow:hidden;position:relative;
  background:var(--surface);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
/* corner brackets */
.capture-area::before,.capture-area::after{content:'';position:absolute;width:32px;height:32px;border:2px solid var(--green);opacity:.5;}
.capture-area::before{top:14px;left:14px;border-right:none;border-bottom:none;border-radius:6px 0 0 0;}
.capture-area::after{bottom:14px;right:14px;border-left:none;border-top:none;border-radius:0 0 6px 0;}

.idle-msg{text-align:center;padding:30px 20px;}
.idle-icon{font-size:56px;margin-bottom:14px;display:block;opacity:.7;}
.idle-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:6px;}
.idle-sub{font-size:11px;color:var(--muted);line-height:1.7;}

#previewImg{width:100%;height:100%;object-fit:cover;display:none;}
#videoEl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
#snapCanvas{display:none;}

.clear-x{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(11,26,14,.8);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.scan-bar{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:scan 1.8s ease-in-out infinite;display:none;}
@keyframes scan{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}

/* ── BOTTOM BAR ── */
.bottom-bar{padding:12px 18px;padding-bottom:max(16px,env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}

.btn-gallery{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;}
.btn-gallery:active{border-color:var(--green);}

.btn-shutter{width:68px;height:68px;border-radius:50%;background:var(--green);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 0 24px rgba(61,255,110,.3);}
.btn-shutter:active{transform:scale(.93);}
.btn-shutter svg{color:#0b1a0e;}

.btn-identify{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;border:1px solid var(--green);background:rgba(61,255,110,.08);color:var(--green);font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;display:none;}
.btn-identify:active{background:rgba(61,255,110,.18);}

/* Camera mode bottom */
.cam-bar{padding:20px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom));display:none;flex-direction:column;align-items:center;gap:14px;background:var(--surface);border-top:1px solid var(--border);}
.snap-ring{width:74px;height:74px;border-radius:50%;border:3px solid var(--green);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.snap-ring:active{transform:scale(.9);}
.snap-dot{width:56px;height:56px;border-radius:50%;background:var(--green);}
.cam-cancel{background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;padding:6px 20px;}

/* hidden file input */
#fileInput{display:none;}

/* ── RESULT PANEL ── */
#resultPanel{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:50;animation:slideUp .35s cubic-bezier(.16,1,.3,1);}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

.result-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));border-bottom:1px solid var(--border);flex-shrink:0;}
.btn-back{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;}
.btn-save{background:none;border:1px solid var(--green);border-radius:10px;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 14px;cursor:pointer;}
.btn-save:active{background:rgba(61,255,110,.1);}

.result-img-wrap{height:220px;flex-shrink:0;overflow:hidden;}
.result-img-wrap img{width:100%;height:100%;object-fit:cover;}

.result-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px;}

.species-name{font-family:'Playfair Display',serif;font-size:30px;line-height:1.1;color:var(--text);margin-bottom:4px;}
.species-sci{font-size:13px;color:var(--green);font-style:italic;margin-bottom:10px;}
.conf-row{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);margin-bottom:16px;}
.conf-track{flex:1;max-width:100px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.conf-fill{height:100%;border-radius:2px;transition:width .8s ease;}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.tag{padding:5px 12px;border-radius:20px;font-size:11px;border:1px solid var(--border);color:var(--muted);}
.tag.hi{border-color:var(--green);color:var(--green);}

.section{margin-bottom:16px;}
.sec-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.sec-text{font-size:13px;line-height:1.75;color:var(--text);}

.facts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.fact{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px;}
.fact-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.fact-val{font-size:13px;color:var(--text);}

.err-box{text-align:center;padding:40px 20px;}
.err-box .ei{font-size:52px;display:block;margin-bottom:16px;}
.err-box h3{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;margin-bottom:8px;}
.err-box p{font-size:13px;color:var(--muted);line-height:1.7;}
.err-detail{margin-top:12px;padding:10px;background:var(--surface2);border-radius:10px;font-size:11px;color:var(--danger);text-align:left;word-break:break-all;}

/* ── HISTORY PANEL ── */
#historyPanel{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:50;animation:slideUp .35s cubic-bezier(.16,1,.3,1);}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));border-bottom:1px solid var(--border);}
.hist-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);}
.btn-clr{background:none;border:none;color:var(--danger);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;}
.hist-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;}
.hist-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;cursor:pointer;}
.hist-item:active{border-color:var(--green);}
.hist-thumb{width:58px;height:58px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--border);}
.hist-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-sci{font-size:11px;color:var(--green);font-style:italic;}
.hist-date{font-size:10px;color:var(--muted);margin-top:3px;}
.hist-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;}
.hist-empty .he{font-size:48px;display:block;margin-bottom:14px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a0a0a;border:1px solid var(--danger);color:var(--danger);padding:12px 20px;border-radius:12px;font-size:12px;max-width:88vw;text-align:center;line-height:1.5;z-index:900;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── LOADING ── */
#loader{position:fixed;inset:0;z-index:800;background:rgba(11,26,14,.88);backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.load-bug{font-size:56px;animation:float 1s ease-in-out infinite;}
.load-dots{display:flex;gap:7px;}
.load-dots span{width:8px;height:8px;border-radius:50%;background:var(--green);animation:dp 1.2s ease-in-out infinite;}
.load-dots span:nth-child(2){animation-delay:.2s;}
.load-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.load-txt{font-size:13px;color:var(--muted);letter-spacing:1px;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <span class="splash-emoji">🔬</span>
  <div class="splash-title">BugLens</div>
  <div class="splash-sub">AI Insect Identifier</div>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logo"><span>🔬</span> BugLens</div>
    <button class="hdr-btn" id="histBtn" title="History">🕐</button>
  </div>

  <!-- Home -->
  <div id="homeView">
    <div class="capture-area" id="captureArea">
      <!-- Idle state -->
      <div class="idle-msg" id="idleMsg">
        <span class="idle-icon">🦋</span>
        <div class="idle-title">Identify any insect</div>
        <div class="idle-sub">Take a photo with your camera<br/>or pick one from your gallery</div>
      </div>
      <!-- Preview image -->
      <img id="previewImg" alt="insect"/>
      <!-- Live camera -->
      <video id="videoEl" autoplay playsinline muted></video>
      <canvas id="snapCanvas"></canvas>
      <!-- Clear button -->
      <button class="clear-x" id="clearBtn">✕</button>
      <!-- Scan animation -->
      <div class="scan-bar" id="scanBar"></div>
    </div>

    <!-- Normal bottom bar -->
    <div class="bottom-bar" id="bottomBar">
      <button class="btn-gallery" id="galleryBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Gallery
      </button>
      <button class="btn-shutter" id="shutterBtn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <button class="btn-identify" id="identifyBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Identify
      </button>
    </div>

    <!-- Camera bottom bar -->
    <div class="cam-bar" id="camBar">
      <div class="snap-ring" id="snapBtn"><div class="snap-dot"></div></div>
      <button class="cam-cancel" id="camCancel">Cancel</button>
    </div>
  </div>

  <!-- Result Panel -->
  <div id="resultPanel">
    <div class="result-hdr">
      <button class="btn-back" id="backBtn">‹ Back</button>
      <span style="font-size:13px;color:var(--muted)">RESULT</span>
      <button class="btn-save" id="saveBtn">Save</button>
    </div>
    <div class="result-img-wrap"><img id="resultImg" alt=""/></div>
    <div class="result-scroll" id="resultBody"></div>
  </div>

  <!-- History Panel -->
  <div id="historyPanel">
    <div class="hist-hdr">
      <button class="btn-back" id="histBack">‹ Back</button>
      <div class="hist-title">My Sightings</div>
      <button class="btn-clr" id="clrHist">Clear</button>
    </div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Loading -->
<div id="loader">
  <div class="load-bug" id="loadBug">🦋</div>
  <div class="load-dots"><span></span><span></span><span></span></div>
  <div class="load-txt">Analysing specimen…</div>
</div>

<!-- Hidden file input — NO capture attribute so it opens gallery -->
<input type="file" id="fileInput" accept="image/*"/>

<script>
'use strict';

// ── State
const S = { img: null, result: null, stream: null, history: [] };

// ── DOM
const get = id => document.getElementById(id);
const splash       = get('splash');
const idleMsg      = get('idleMsg');
const previewImg   = get('previewImg');
const videoEl      = get('videoEl');
const snapCanvas   = get('snapCanvas');
const clearBtn     = get('clearBtn');
const scanBar      = get('scanBar');
const bottomBar    = get('bottomBar');
const camBar       = get('camBar');
const galleryBtn   = get('galleryBtn');
const shutterBtn   = get('shutterBtn');
const identifyBtn  = get('identifyBtn');
const snapBtn      = get('snapBtn');
const camCancel    = get('camCancel');
const fileInput    = get('fileInput');
const loader       = get('loader');
const loadBug      = get('loadBug');
const resultPanel  = get('resultPanel');
const resultImg    = get('resultImg');
const resultBody   = get('resultBody');
const backBtn      = get('backBtn');
const saveBtn      = get('saveBtn');
const histBtn      = get('histBtn');
const historyPanel = get('historyPanel');
const histBack     = get('histBack');
const clrHist      = get('clrHist');
const histList     = get('histList');

// ── Splash
setTimeout(() => splash.classList.add('hide'), 1800);

// ── Bug emoji cycle
const BUGS = ['🦋','🐝','🐞','🦗','🪲','🦟','🐛','🦎','🐜'];
let bi = 0;
setInterval(() => { loadBug.textContent = BUGS[bi++ % BUGS.length]; }, 900);

// ── Load history
try { S.history = JSON.parse(localStorage.getItem('bl_hist') || '[]'); } catch { S.history = []; }

// ── Events
galleryBtn.addEventListener('click', openGallery);
shutterBtn.addEventListener('click', openCamera);
identifyBtn.addEventListener('click', runIdentify);
clearBtn.addEventListener('click', resetImage);
snapBtn.addEventListener('click', takeSnap);
camCancel.addEventListener('click', stopCamera);
backBtn.addEventListener('click', () => { resultPanel.style.display = 'none'; });
saveBtn.addEventListener('click', doSave);
histBtn.addEventListener('click', openHistory);
histBack.addEventListener('click', () => { historyPanel.style.display = 'none'; });
clrHist.addEventListener('click', clearHistory);
fileInput.addEventListener('change', onFileChosen);

// ── Gallery
function openGallery() {
  fileInput.value = '';
  fileInput.removeAttribute('capture');
  fileInput.click();
}

function onFileChosen(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => resizeAndSet(ev.target.result);
  reader.readAsDataURL(file);
}

// ── Camera
async function openCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    S.stream = stream;
    videoEl.srcObject = stream;
    videoEl.style.display = 'block';
    idleMsg.style.display = 'none';
    previewImg.style.display = 'none';
    bottomBar.style.display = 'none';
    camBar.style.display = 'flex';
    clearBtn.style.display = 'none';
  } catch(err) {
    alert('Camera not available. Please use Gallery instead.\n\nError: ' + err.message);
  }
}

function stopCamera() {
  if (S.stream) { S.stream.getTracks().forEach(t => t.stop()); S.stream = null; }
  videoEl.style.display = 'none';
  videoEl.srcObject = null;
  camBar.style.display = 'none';
  bottomBar.style.display = 'flex';
  if (!S.img) idleMsg.style.display = 'block';
}

function takeSnap() {
  const w = videoEl.videoWidth, h = videoEl.videoHeight;
  snapCanvas.width = w; snapCanvas.height = h;
  snapCanvas.getContext('2d').drawImage(videoEl, 0, 0, w, h);
  const data = snapCanvas.toDataURL('image/jpeg', 0.85);
  stopCamera();
  resizeAndSet(data);
}

// ── Image helpers
function resizeAndSet(dataUrl) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height, max = 800;
    if (w > max || h > max) {
      if (w > h) { h = Math.round(h * max / w); w = max; }
      else        { w = Math.round(w * max / h); h = max; }
    }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    const resized = c.toDataURL('image/jpeg', 0.75);
    const sizeKB = Math.round((resized.length * 3) / 4 / 1024);
    console.log('Image size after resize:', sizeKB, 'KB');
    if (sizeKB > 4500) {
      alert('Image too large even after resize (' + sizeKB + 'KB). Try a different photo.');
      return;
    }
    setImage(resized);
  };
  img.onerror = () => alert('Could not read this image. Please try another photo.');
  img.src = dataUrl;
}

function setImage(dataUrl) {
  S.img = dataUrl;
  previewImg.src = dataUrl;
  previewImg.style.display = 'block';
  idleMsg.style.display = 'none';
  clearBtn.style.display = 'flex';
  bottomBar.style.display = 'flex';
  camBar.style.display = 'none';
  // Show identify, hide gallery+camera
  galleryBtn.style.display = 'none';
  shutterBtn.style.display = 'none';
  identifyBtn.style.display = 'flex';
}

function resetImage() {
  S.img = null; S.result = null;
  previewImg.style.display = 'none';
  previewImg.src = '';
  clearBtn.style.display = 'none';
  scanBar.style.display = 'none';
  idleMsg.style.display = 'block';
  galleryBtn.style.display = 'flex';
  shutterBtn.style.display = 'flex';
  identifyBtn.style.display = 'none';
}

// ── Identify
async function runIdentify() {
  if (!S.img) return;
  showLoader(true);
  scanBar.style.display = 'block';

  try {
    const base64    = S.img.split(',')[1];
    const mediaType = S.img.split(';')[0].split(':')[1] || 'image/jpeg';

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: `You are an expert entomologist. Look at this image carefully.
Respond with ONLY a raw JSON object. No markdown. No backticks. No explanation. Just JSON.
{
  "commonName": "...",
  "scientificName": "...",
  "order": "...",
  "family": "...",
  "confidence": 90,
  "size": "...",
  "diet": "...",
  "lifespan": "...",
  "habitat": "...",
  "distribution": "...",
  "conservationStatus": "...",
  "dangerLevel": "Harmless",
  "description": "...",
  "tags": ["...","...","..."]
}
confidence = 0-100. dangerLevel = Harmless | Mild sting | Venomous | Dangerous.
If no insect visible: commonName="Not an insect", scientificName="N/A", confidence=0.` }
          ]
        }]
      })
    });

    if (!res.ok) {
      const errJson = await res.json().catch(() => ({}));
      const msg = errJson?.error?.message || `HTTP ${res.status}`;
      throw new Error(msg);
    }

    const data = await res.json();
    if (!data.content?.length) throw new Error('Empty API response');

    const raw = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    // Strip any accidental markdown fences
    const clean = raw.replace(/```[\w]*\n?/g, '').trim();
    const parsed = JSON.parse(clean);
    S.result = parsed;
    showResult(parsed, S.img);

  } catch(err) {
    console.error('Identify error:', err);
    showError(err.message);
  } finally {
    showLoader(false);
    scanBar.style.display = 'none';
  }
}

// ── Result display
function showResult(r, imgUrl) {
  resultImg.src = imgUrl;
  const cc = r.confidence >= 80 ? '#3dff6e' : r.confidence >= 50 ? '#ffcc44' : '#ff5c5c';
  const dc = { Harmless:'#3dff6e','Mild sting':'#ffcc44', Venomous:'#ff9a3c', Dangerous:'#ff5c5c' };
  const dclr = dc[r.dangerLevel] || '#3dff6e';
  const tags = (r.tags||[]).map(t => `<span class="tag hi">${t}</span>`).join('');

  resultBody.innerHTML = `
    <div style="margin-bottom:18px">
      <div class="species-name">${r.commonName}</div>
      <div class="species-sci">${r.scientificName}</div>
      <div class="conf-row">
        Confidence
        <div class="conf-track"><div class="conf-fill" style="width:0;background:${cc}" data-w="${r.confidence}"></div></div>
        ${r.confidence}%
      </div>
    </div>
    <div class="tags">
      <span class="tag">${r.order||''}</span>
      <span class="tag">${r.family||''}</span>
      <span class="tag" style="border-color:${dclr};color:${dclr}">${r.dangerLevel||''}</span>
      ${tags}
    </div>
    <div class="section">
      <div class="sec-label">About</div>
      <div class="sec-text">${r.description||'—'}</div>
    </div>
    <div class="facts">
      <div class="fact"><div class="fact-lbl">Size</div><div class="fact-val">${r.size||'—'}</div></div>
      <div class="fact"><div class="fact-lbl">Diet</div><div class="fact-val">${r.diet||'—'}</div></div>
      <div class="fact"><div class="fact-lbl">Lifespan</div><div class="fact-val">${r.lifespan||'—'}</div></div>
      <div class="fact"><div class="fact-lbl">Status</div><div class="fact-val">${r.conservationStatus||'—'}</div></div>
    </div>
    <div class="section" style="margin-top:14px">
      <div class="sec-label">Habitat</div>
      <div class="sec-text">${r.habitat||'—'}</div>
    </div>
    <div class="section">
      <div class="sec-label">Distribution</div>
      <div class="sec-text">${r.distribution||'—'}</div>
    </div>
  `;
  resultPanel.style.display = 'flex';
  setTimeout(() => {
    const f = resultBody.querySelector('.conf-fill');
    if (f) f.style.width = f.dataset.w + '%';
  }, 120);
}

function showError(detail) {
  // Show in result panel
  resultImg.src = S.img || '';
  resultBody.innerHTML = `
    <div class="err-box">
      <span class="ei">🔍</span>
      <h3>Could Not Identify</h3>
      <p>Try a clearer, closer photo with good lighting.</p>
      ${detail ? `<div class="err-detail">Error: ${detail}</div>` : ''}
    </div>`;
  resultPanel.style.display = 'flex';
  // Also show toast
  showToast('❌ ' + (detail || 'Identification failed'));
}

function showToast(msg, duration=4000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── Save / History
function doSave() {
  if (!S.result || !S.img) return;
  const entry = {
    id: Date.now(),
    result: S.result,
    image: S.img,
    date: new Date().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
  };
  S.history.unshift(entry);
  if (S.history.length > 20) S.history = S.history.slice(0, 20);
  try { localStorage.setItem('bl_hist', JSON.stringify(S.history)); } catch {}
  saveBtn.textContent = '✓ Saved';
  setTimeout(() => saveBtn.textContent = 'Save', 2000);
}

function openHistory() {
  renderHistory();
  historyPanel.style.display = 'flex';
}

function clearHistory() {
  if (!confirm('Delete all sightings?')) return;
  S.history = [];
  try { localStorage.removeItem('bl_hist'); } catch {}
  renderHistory();
}

function renderHistory() {
  if (!S.history.length) {
    histList.innerHTML = '<div class="hist-empty"><span class="he">🔬</span>No sightings yet.<br/>Identify an insect and tap Save!</div>';
    return;
  }
  histList.innerHTML = S.history.map(e => `
    <div class="hist-item" data-id="${e.id}">
      <img class="hist-thumb" src="${e.image}" onerror="this.style.opacity=0"/>
      <div style="min-width:0">
        <div class="hist-name">${e.result.commonName}</div>
        <div class="hist-sci">${e.result.scientificName}</div>
        <div class="hist-date">${e.date}</div>
      </div>
    </div>`).join('');

  histList.querySelectorAll('.hist-item').forEach(el => {
    el.addEventListener('click', () => {
      const entry = S.history.find(h => h.id == el.dataset.id);
      if (!entry) return;
      S.result = entry.result; S.img = entry.image;
      historyPanel.style.display = 'none';
      showResult(entry.result, entry.image);
    });
  });
}

// ── Loader
function showLoader(on) { loader.style.display = on ? 'flex' : 'none'; }
</script>
</body>
</html>
